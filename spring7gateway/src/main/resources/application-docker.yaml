# logging.level:
#   '[reactor.netty]': trace

spring:
  application.name: spring7gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth-server:9000
  cloud:
    gateway:
      server:
        webflux:
          # httpclient.wiretap: true
          # httpserver.wiretap: true
          routes:
            - id: spring7restwebmvc
              uri: http://rest-mvc:8080
              predicates:
                - Path=/api/v1/*
            - id: spring7reactive
              uri: http://reactive:8080
              predicates:
                - Path=/api/v2/*
            - id: spring7reactivemongo
              uri: http://reactive-mongo:8080
              predicates:
                - Path=/api/v3/*
            - id: spring7authserver
              uri: http://auth-server:9000
              predicates:
              - Path=/oauth2/**

management:
  endpoint.health.probes.enabled: true
  health:
    readinessstate.enabled: true
    livenessstate.enabled: true

logging.level:
  '[org.zalando.logbook]': trace
