services:
  gateway:
    image: spring7gateway:0.0.1-SNAPSHOT
    ports:
    - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
  auth-server:
    image: spring7authserver:0.0.1-SNAPSHOT
    ports:
    - "9000:9000"
  rest-mvc:
    image: spring7restmvc:0.0.1-SNAPSHOT
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUERURI: http://auth-server:9000
      SPRING_PROFILES_ACTIVE: localmysql
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/restdb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    depends_on:
      - mysql
  reactive:
    image: spring7reactive:0.0.1-SNAPSHOT
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUERURI: http://auth-server:9000
      SERVER_PORT: "8080"
  mysql:
    image: mysql:9.5.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: restdb
      MYSQL_USER: restadmin
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass

volumes:
  mysql_data:
  mongo_data:
